name: Quality gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Check Python dependencies
        run: python -m pip check

      - name: Run default backend tests
        env:
          JWT_SECRET: ci-temporary-test-secret
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest backend/tests -q -p no:cacheprovider

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check committed diff whitespace
        run: git diff --check HEAD^ HEAD

      - name: Reject tracked secrets and private keys
        shell: bash
        run: |
          if git ls-files --error-unmatch backend/.env >/dev/null 2>&1; then
            echo "backend/.env must not be tracked"
            exit 1
          fi
          if git grep -nE -- '-----BEGIN (RSA |EC |OPENSSH |)?PRIVATE KEY-----'; then
            exit 1
          fi
          if git grep -nE -- '^(DASHSCOPE_API_KEY|MYSQL_PASSWORD|JWT_SECRET)=[^[:space:]]+' -- ':!backend/.env.example'; then
            exit 1
          fi
          if git grep -nE -- 'mysql(\+[^:]+)?://[A-Za-z0-9._-]+:[A-Za-z0-9._-]+@'; then
            exit 1
          fi
